<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Expense Sharing App" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,shrink-to-fit=no" />
    <meta name="theme-color" content="#007bff" />
    <title>Mode Selection</title>
    <!-- Favicon Link -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/3653/3653239.png" type="image/x-icon">
    <!-- Bootstrap CDN Link -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Font Awesome CDN Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-+J+J+qJQvzJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJvJw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="modestyle.css">

</head>

<body>
    <div id="main-container" class="centered-flex">
        <div class="form-container">
            <div class="icon centered-flex">
                <i class="fa fa-expeditedssl"></i>
            </div>
            <div class="Mode">MODE SELECTION</div>
            <form id="login-form" class="centered-flex">
                <div class="msg"></div>
                <div class="field">
                    <select id="Mode_Selection" class="form-control">
                        <option value="Choose Mode" selected disabled>Choose Mode</option>
                        <option value="manual-mode" id="manual-mode">Manual Mode</option>
                        <option value="voice-mode" id="voice-mode">Voice Recognition Mode</option>
                    </select>
                </div>
                <div class="btn-container"><button id="btn" class="btn btn-primary btn-block">Submit</button></div>
            </form>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="modeselection.js"></script>
</body>

</html>
